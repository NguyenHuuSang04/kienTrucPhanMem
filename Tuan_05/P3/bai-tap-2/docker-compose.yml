services:
  mongo:
    image: mongo:latest
    container_name: bt2_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  api:
    build: .
    container_name: bt2_api
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/myapp
    ports:
      - "3000:3000"
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
