services:
  web:
    build: .
    container_name: bt8_django_app
    restart: always
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - task_network

  worker:
    build: .
    container_name: bt8_celery_worker
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - ./:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - task_network

  redis:
    image: redis:alpine
    container_name: bt8_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - task_network

networks:
  task_network:
    driver: bridge
