services:
  app:
    image: node:20-alpine
    container_name: bt6_app_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"

  tests:
    image: node:20-alpine
    container_name: bt6_tests
    working_dir: /app
    command: sh -c "npm install && npm run test:watch"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
